name: 'Configure OCCT'
description: 'Setup vcpkg and configure OCCT on a specific platform without building'

inputs:
  platform:
    description: 'Platform (windows, macos, linux)'
    required: true
  compiler:
    description: 'Compiler (msvc, clang, gcc)'
    required: true
  additional-cmake-flags:
    description: 'Additional CMake flags'
    required: false
    default: ''
  use-vtk:
    description: 'Enable VTK'
    required: false
    default: 'false'
  build-use-pch:
    description: 'Enable precompiled headers'
    required: false
    default: 'true'
  build-opt-profile:
    description: 'Build optimization profile'
    required: false
    default: 'Production'
  cmake-build-type:
    description: 'CMake build type (Release, Debug, etc)'
    required: false
    default: 'Release'
  github-token:
    description: 'GitHub token for vcpkg NuGet package access'
    required: true

runs:
  using: "composite"
  steps:
    - name: Setup vcpkg
      uses: ./.github/actions/vcpkg-setup
      with:
        github-token: ${{ inputs.github-token }}
        platform: ${{ inputs.platform }}

    - name: Restore Tcl/Tk/Thread cache (Windows ARM64)
      if: ${{ inputs.platform == 'windows-arm64' }}
      id: cache-tcltk
      uses: actions/cache/restore@v4
      with:
        path: C:\Tcltk
        key: tcl-tk-thread-windows-arm64

    - name: Build Tcl/Tk/Thread (Windows ARM64)
      if: ${{ inputs.platform == 'windows-arm64' && steps.cache-tcltk.outputs.cache-hit != 'true' }}
      shell: cmd
      run: |
        call "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvarsall.bat" arm64

        rem ===== Tcl 8.6.15 =====
        git clone https://github.com/tcltk/tcl.git
        cd tcl
        git checkout core-8-6-15
        cd win
        nmake -f makefile.vc INSTALLDIR=C:\Tcltk
        nmake -f makefile.vc install-binaries install-libraries INSTALLDIR=C:\Tcltk
        cd ..\..

        rem ===== Tk 8.6.15 =====
        git clone https://github.com/tcltk/tk.git
        cd tk
        git checkout core-8-6-15
        cd win
        nmake -f makefile.vc INSTALLDIR=C:\Tcltk TCLDIR=%GITHUB_WORKSPACE%\tcl
        nmake -f makefile.vc install-binaries install-libraries INSTALLDIR=C:\Tcltk TCLDIR=%GITHUB_WORKSPACE%\tcl
        cd ..\..

        rem ===== Thread 2.8.10 =====
        git clone https://github.com/tcltk/thread.git
        cd thread
        git checkout thread-2-8-10
        cd win
        nmake -f makefile.vc INSTALLDIR=C:\Tcltk TCLDIR=C:\Tcltk
        nmake -f makefile.vc install INSTALLDIR=C:\Tcltk TCLDIR=C:\Tcltk

        echo Done building Tcl, Tk, and Thread for Windows ARM64

    - name: Save Tcl/Tk/Thread cache (Windows ARM64)
      if: ${{ inputs.platform == 'windows-arm64' && steps.cache-tcltk.outputs.cache-hit != 'true' }}
      uses: actions/cache/save@v4
      with:
        path: C:\Tcltk
        key: tcl-tk-thread-windows-arm64

    - name: Add Tcl/Tk to PATH (Windows ARM64)
      if: ${{ inputs.platform == 'windows-arm64' }}
      run: echo "C:\Tcltk\bin" >> $env:GITHUB_PATH
      shell: pwsh

    - name: Upload Tcl/Tk/Thread artifact (Windows ARM64)
      if: ${{ inputs.platform == 'windows-arm64' }}
      uses: actions/upload-artifact@v4
      with:
        name: tcl-tk-thread-windows-arm64
        path: C:\Tcltk
        overwrite: true

    - name: Download and extract Mesa3D (Windows)
      if: ${{ inputs.platform == 'windows' }}
      run: |
        curl -L -o mesa3d.7z https://github.com/pal1000/mesa-dist-win/releases/download/24.3.2/mesa3d-24.3.2-release-mingw.7z
        7z x mesa3d.7z -omesa3d
      shell: pwsh

    - name: Run system-wide deployment (Windows)
      if: ${{ inputs.platform == 'windows' }}
      run: |
        cd mesa3d
        .\systemwidedeploy.cmd 1
        .\systemwidedeploy.cmd 5
      shell: cmd

    - name: Install dependencies (Linux)
      if: ${{ inputs.platform == 'linux' }}
      run: sudo apt-get update && sudo apt-get install -y cmake ${{ inputs.compiler == 'clang' && 'clang' || 'gcc g++' }} make libglu1-mesa-dev libegl1-mesa-dev libgles2-mesa-dev
      shell: bash

    - name: Install required packages (macOS)
      if: ${{ inputs.platform == 'macos' }}
      run: |
        brew update || true
        # temporary workaround for missing tcl-tk
        brew install tcl-tk || true
        # Force link any conflicting packages
        brew link --overwrite python@3.12 || true
        brew link --overwrite python@3.13 || true
      shell: bash

    - name: Configure OCCT (Windows)
      if: ${{ inputs.platform == 'windows' }}
      run: |
          mkdir build
          cd build
          cmake -T ${{ inputs.compiler == 'msvc' && 'host=x64' || 'ClangCL' }} `
                -D USE_FREETYPE=ON `
                -D USE_TK=ON `
                -D BUILD_USE_PCH=${{ inputs.build-use-pch }} `
                -D BUILD_OPT_PROFILE=${{ inputs.build-opt-profile }} `
                -D BUILD_INCLUDE_SYMLINK=ON `
                -D CMAKE_BUILD_TYPE=${{ inputs.cmake-build-type }} `
                -D INSTALL_DIR=${{ github.workspace }}/install `
                -D BUILD_USE_VCPKG=ON `
                -D VCPKG_TARGET_TRIPLET=x64-windows `
                -D USE_D3D=ON `
                -D USE_DRACO=ON `
                -D USE_FFMPEG=ON `
                -D USE_FREEIMAGE=ON `
                -D USE_GLES2=ON `
                -D USE_OPENVR=ON `
                -D USE_VTK=${{ inputs.use-vtk }} `
                -D USE_TBB=ON `
                -D USE_RAPIDJSON=ON `
                -D USE_OPENGL=ON `
                -D BUILD_GTEST=ON `
                -D BUILD_CPP_STANDARD=C++17 `
                -D INSTALL_GTEST=ON `
                ${{ inputs.additional-cmake-flags }} ..
          echo "Configuration completed successfully for Windows"
      shell: pwsh

    - name: Configure OCCT (Windows-arm64)
      if: ${{ inputs.platform == 'windows-arm64' }}
      run: |
          mkdir build
          cd build
          cmake -G "Visual Studio 17 2022" `
                -A ARM64 `
                -D USE_FREETYPE=ON `
                -D USE_TK=ON `
                -D 3RDPARTY_TCL_DIR="C:/Tcltk" `
                -D 3RDPARTY_TCL_INCLUDE_DIR="C:/Tcltk/include" `
                -D 3RDPARTY_TCL_LIBRARY="C:/Tcltk/lib/tcl86t.lib" `
                -D 3RDPARTY_TCL_LIBRARY_DIR="C:/Tcltk/lib" `
                -D 3RDPARTY_TCL_DLL="C:/Tcltk/bin/tcl86t.dll" `
                -D 3RDPARTY_TCL_DLL_DIR="C:/Tcltk/bin" `
                -D 3RDPARTY_TK_DIR="C:/Tcltk" `
                -D 3RDPARTY_TK_INCLUDE_DIR="C:/Tcltk/include" `
                -D 3RDPARTY_TK_LIBRARY="C:/Tcltk/lib/tk86t.lib" `
                -D 3RDPARTY_TK_LIBRARY_DIR="C:/Tcltk/lib" `
                -D 3RDPARTY_TK_DLL="C:/Tcltk/bin/tk86t.dll" `
                -D 3RDPARTY_TK_DLL_DIR="C:/Tcltk/bin" `
                -D BUILD_USE_PCH=${{ inputs.build-use-pch }} `
                -D BUILD_OPT_PROFILE=${{ inputs.build-opt-profile }} `
                -D BUILD_INCLUDE_SYMLINK=OFF `
                -D CMAKE_BUILD_TYPE=${{ inputs.cmake-build-type }} `
                -D INSTALL_DIR=${{ github.workspace }}/install `
                -D BUILD_USE_VCPKG=ON `
                -D CMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
                -D VCPKG_TARGET_TRIPLET=arm64-windows `
                -D USE_D3D=ON `
                -D USE_DRACO=ON `
                -D USE_FFMPEG=ON `
                -D USE_FREEIMAGE=ON `
                -D USE_GLES2=ON `
                -D USE_OPENVR=OFF `
                -D USE_VTK=${{ inputs.use-vtk }} `
                -D USE_TBB=ON `
                -D USE_RAPIDJSON=ON `
                -D USE_OPENGL=ON `
                -D BUILD_GTEST=ON `
                -D BUILD_CPP_STANDARD=C++17 `
                -D INSTALL_GTEST=ON `
                ${{ inputs.additional-cmake-flags }} ..
          echo "Configuration completed successfully for Windows-arm64"
      shell: pwsh

    - name: Configure OCCT (macOS)
      if: ${{ inputs.platform == 'macos' }}
      run: |
        mkdir -p build
        cd build
        cmake -G "Unix Makefiles" \
              -D CMAKE_C_COMPILER=${{ inputs.compiler == 'clang' && 'clang' || 'gcc' }} \
              -D CMAKE_CXX_COMPILER=${{ inputs.compiler == 'clang' && 'clang++' || 'g++' }} \
              -D BUILD_USE_PCH=${{ inputs.build-use-pch }} \
              -D BUILD_OPT_PROFILE=${{ inputs.build-opt-profile }} \
              -D BUILD_INCLUDE_SYMLINK=ON \
              -D CMAKE_BUILD_TYPE=${{ inputs.cmake-build-type }} \
              -D INSTALL_DIR=${{ github.workspace }}/install \
              -D BUILD_USE_VCPKG=ON \
              -D VCPKG_TARGET_TRIPLET=arm64-osx-dynamic \
              -D USE_RAPIDJSON=ON \
              -D USE_DRACO=ON \
              -D USE_FREETYPE=ON \
              -D USE_OPENGL=ON \
              -D USE_FREEIMAGE=ON \
              -D BUILD_GTEST=ON \
              -D BUILD_CPP_STANDARD=C++17 \
              -D INSTALL_GTEST=ON \
              -D CMAKE_CXX_FLAGS="-Werror -Wall -Wextra -Wno-deprecated-declarations -Wno-unknown-warning-option -Wno-error=cast-function-type-mismatch" \
              ${{ inputs.additional-cmake-flags }} ..
        echo "Configuration completed successfully for macOS"
      shell: bash

    - name: Configure OCCT (Linux)
      if: ${{ inputs.platform == 'linux' }}
      run: |
        mkdir -p build
        cd build
        # Set environment to help vcpkg find system libraries
        export PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig:$PKG_CONFIG_PATH"
        export CMAKE_PREFIX_PATH="/usr:/usr/local:$CMAKE_PREFIX_PATH"
        cmake -G "Unix Makefiles" \
              -D CMAKE_C_COMPILER=${{ inputs.compiler == 'clang' && 'clang' || 'gcc' }} \
              -D CMAKE_CXX_COMPILER=${{ inputs.compiler == 'clang' && 'clang++' || 'g++' }} \
              -D BUILD_USE_PCH=${{ inputs.build-use-pch }} \
              -D BUILD_INCLUDE_SYMLINK=ON \
              -D BUILD_OPT_PROFILE=${{ inputs.build-opt-profile }} \
              -D USE_TK=ON \
              -D CMAKE_BUILD_TYPE=${{ inputs.cmake-build-type }} \
              -D INSTALL_DIR=${{ github.workspace }}/install \
              -D BUILD_USE_VCPKG=ON \
              -D BUILD_LIBRARY_TYPE=Shared \
              -D VCPKG_TARGET_TRIPLET=x64-linux-dynamic \
              -D USE_FREETYPE=ON \
              -D USE_DRACO=ON \
              -D USE_FFMPEG=ON \
              -D USE_FREEIMAGE=ON \
              -D USE_GLES2=ON \
              -D USE_OPENVR=ON \
              -D USE_VTK=${{ inputs.use-vtk }} \
              -D USE_TBB=ON \
              -D USE_RAPIDJSON=ON \
              -D USE_OPENGL=ON \
              -D BUILD_GTEST=ON \
              -D BUILD_CPP_STANDARD=C++17 \
              -D INSTALL_GTEST=ON \
              ${{ inputs.additional-cmake-flags }} ..
        echo "Configuration completed successfully for Linux"
      shell: bash