name: 'Run DE Wrapper Test'
description: 'Run specific DE_Wrapper configuration test on WOA'
 
inputs:
  platform:
    description: 'Platform (windows, macos, linux)'
    required: true
  compiler:
    description: 'Compiler (msvc, clang, gcc)'
    required: true
  install-artifact-name:
    description: 'Name of the artifact containing the install directory'
    required: true
 
runs:
  using: "composite"
  steps:
    - name: Download vcpkg cache
      uses: ./.github/actions/download-vcpkg-cache
      with:
        artifact-name: ${{ inputs.install-artifact-name }}-cache
 
    - name: Download Tcl/Tk binaries (Windows-arm64)
      if: ${{ inputs.platform == 'windows-arm64' }}
      uses: actions/download-artifact@v4
      with:
        name: tcl-tk-thread-windows-arm64
        path: C:\Tcltk
 
    - name: Add Tcltk to Path (Windows-arm64)
      if: ${{ inputs.platform == 'windows-arm64' }}
      shell: cmd
      run: |
        echo C:\Tcltk\bin>> %GITHUB_PATH%
 
    - name: Download and extract install directory
      uses: ./.github/actions/download-artifacts
      with:
        name: ${{ inputs.install-artifact-name }}
        path: install
 
    - name: Download and extract Mesa3D (Windows-arm64)
      if: ${{ inputs.platform == 'windows-arm64' }}
      run: |
        curl -L -o mesa3d-arm64.7z https://github.com/mmozeiko/build-mesa/releases/download/24.3.2/mesa-llvmpipe-arm64-24.3.2.zip
        7z x mesa3d-arm64.7z -oinstall\win64\vc14\bin -y
      shell: pwsh
 
    # DIAGNOSTIC: Print environment info
    - name: Print diagnostic info
      if: ${{ inputs.platform == 'windows-arm64' }}
      run: |
        echo "=== Environment Diagnostics ==="
        echo "Tcl version:"
        where tclsh 2>nul
        if %ERRORLEVEL% EQU 0 (
          echo puts [info patchlevel] | tclsh
        ) else (
          echo Tcl not found in PATH
        )
        echo "Current locale:"
        powershell -Command "[System.Globalization.CultureInfo]::CurrentCulture"
        echo "CSF Variables:"
        set | findstr CSF 2>nul
        echo "PATH:"
        echo %PATH%
        exit 0
      shell: cmd
 
    # RUN ONLY THE FAILING TEST
# RUN ONLY THE FAILING TEST
    - name: Run DE Wrapper Test
      shell: cmd
      run: |
        @echo off
        :: 1. Define paths using GitHub Expressions
        set "TCL_BIN=C:\Tcltk\bin"
        set "VCPKG_BIN=${{ github.workspace }}\build\vcpkg_installed\arm64-windows\bin"
        
        :: 2. Apply to Path for this local session
        set "PATH=%TCL_BIN%;%VCPKG_BIN%;%PATH%"
        
        :: 3. Navigate and Setup OCCT
        cd install
        call env.bat vc14 win64 release
        
        :: 4. Create the test script
        echo testgrid de_wrapper configuration A1 > run_test.tcl
        echo puts "=== Checking Tcl Interpreter ===" >> run_test.tcl
        echo puts [info patchlevel] >> run_test.tcl
        
        :: 5. Run the app
        DRAWEXE.exe -v -f run_test.tcl
      env:
        LIBGL_ALWAYS_SOFTWARE: 1
        CSF_TestScriptsPath: ${{ github.workspace }}/tests
        CSF_TestDataPath: ${{ github.workspace }}/data
        CSF_LANGUAGE: us
        LC_NUMERIC: C
 
    - name: Clean up test results (Windows-arm64)
      if: ${{ inputs.platform == 'windows-arm64' }}
      run: |
        cd install
        call env.bat vc14 win64 release
        DRAWEXE.exe -v -c cleanuptest results/de_wrapper_debug
      shell: cmd
      env:
        CSF_TestScriptsPath: ${{ github.workspace }}/tests
        CSF_TestDataPath: ${{ github.workspace }}/data
 
    - name: Upload test results (Windows-arm64)
      if: ${{ inputs.platform == 'windows-arm64' }}
      uses: actions/upload-artifact@v4.6.2
      with:
        name: results-de-wrapper-config-test
        path: |
          install/results/**/*.log
          install/results/**/*.png
          install/results/**/*.html
        retention-days: 15