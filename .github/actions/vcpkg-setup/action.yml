name: 'Setup vcpkg'
description: 'Setup vcpkg dependencies for OCCT build on a specific platform'

inputs:
  vcpkg-tag:
    description: 'vcpkg tag to checkout'
    required: false
    default: '2025.10.17'
  github-token:
    description: 'GitHub token for NuGet package access'
    required: true
  platform:
    description: 'Platform (windows, windows-arm64, macos, linux)'
    required: false
    default: ''

runs:
  using: "composite"
  steps:
    # --- 1. ENVIRONMENT SETUP ---
    - name: Set environment variables (Unix)
      if: runner.os != 'Windows'
      run: |
        echo "USERNAME=Open-Cascade-SAS" >> $GITHUB_ENV
        echo "VCPKG_ROOT=${{ github.workspace }}/vcpkg" >> $GITHUB_ENV
        echo "VCPKG_EXE=${{ github.workspace }}/vcpkg/vcpkg" >> $GITHUB_ENV
        echo "FEED_URL=https://nuget.pkg.github.com/Open-Cascade-SAS/index.json" >> $GITHUB_ENV
        echo "VCPKG_BINARY_SOURCES=clear;nuget,https://nuget.pkg.github.com/Open-Cascade-SAS/index.json,readwrite" >> $GITHUB_ENV
        echo "VCPKG_FEATURE_FLAGS=binarycaching,manifests,versions" >> $GITHUB_ENV
        echo "VCPKG_DISABLE_COMPILER_TRACKING=1" >> $GITHUB_ENV
        echo "VCPKG_INSTALL_OPTIONS=--x-abi-tools-use-exact-versions;--clean-after-build" >> $GITHUB_ENV
      shell: bash

    - name: Set environment variables (Windows)
      if: runner.os == 'Windows'
      run: |
        echo "USERNAME=Open-Cascade-SAS" >> $env:GITHUB_ENV
        echo "VCPKG_ROOT=${{ github.workspace }}\vcpkg" >> $env:GITHUB_ENV
        echo "VCPKG_EXE=${{ github.workspace }}\vcpkg\vcpkg.exe" >> $env:GITHUB_ENV
        echo "FEED_URL=https://nuget.pkg.github.com/Open-Cascade-SAS/index.json" >> $env:GITHUB_ENV
        echo "VCPKG_BINARY_SOURCES=clear;nuget,https://nuget.pkg.github.com/Open-Cascade-SAS/index.json,readwrite" >> $env:GITHUB_ENV
        echo "VCPKG_FEATURE_FLAGS=binarycaching,manifests,versions" >> $env:GITHUB_ENV
        echo "VCPKG_DISABLE_COMPILER_TRACKING=1" >> $env:GITHUB_ENV
        echo "VCPKG_INSTALL_OPTIONS=--x-abi-tools-use-exact-versions;--clean-after-build" >> $env:GITHUB_ENV
      shell: pwsh

    - name: Override binary source for windows-arm64
      if: ${{ inputs.platform == 'windows-arm64' }}
      run: |
        echo "VCPKG_BINARY_SOURCES=clear;files,${{ github.workspace }}\vcpkg-cache,readwrite" >> $env:GITHUB_ENV
        echo "VCPKG_DOWNLOADS=${{ github.workspace }}\vcpkg\downloads" >> $env:GITHUB_ENV
      shell: pwsh

    # --- 2. CACHING (RESTORE & REGISTER POST-JOB SAVE) ---
    - name: Cache vcpkg tool (windows-arm64)
      if: ${{ inputs.platform == 'windows-arm64' }}
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}\vcpkg
        key: vcpkg-tool-windows-arm64-${{ inputs.vcpkg-tag }}

    - name: Cache vcpkg binary cache (windows-arm64)
      if: ${{ inputs.platform == 'windows-arm64' }}
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}\vcpkg-cache
        key: vcpkg-binary-windows-arm64-${{ inputs.vcpkg-tag }}-${{ hashFiles('**/vcpkg.json', '**/vcpkg-configuration.json') }}
        restore-keys: |
          vcpkg-binary-windows-arm64-${{ inputs.vcpkg-tag }}-
          vcpkg-binary-windows-arm64-

    # --- 3. DIRECTORY VALIDATION (Fixes "Path(s) do not exist" warning) ---
    - name: Ensure directories exist (windows-arm64)
      if: ${{ inputs.platform == 'windows-arm64' }}
      run: |
        if (!(Test-Path "${{ github.workspace }}\vcpkg-cache")) { 
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\vcpkg-cache" 
        }
      shell: pwsh

    # --- 4. PACKAGE INSTALLATION ---
    - name: Install required packages (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ninja-build curl zip unzip tar nasm autoconf mono-complete \
              libx11-dev libxi-dev libxext-dev mesa-common-dev libglu1-mesa-dev libegl1-mesa-dev libgles2-mesa-dev
      shell: bash

    - name: Install required packages (macOS)
      if: runner.os == 'macOS'
      run: |
        brew update || true
        brew install cmake ninja nasm autoconf automake mono openexr autoconf-archive libtool || true
        brew install --cask xquartz || true
      shell: bash

    # --- 5. VCPKG BOOTSTRAP (Skips if Cache Restored) ---
    - name: Set up vcpkg (Unix)
      if: runner.os != 'Windows'
      run: |
        if [ ! -d "vcpkg/.git" ]; then
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          git checkout ${{ inputs.vcpkg-tag }}
          ./bootstrap-vcpkg.sh
        else
          echo "vcpkg already cached, skipping clone and bootstrap."
        fi
      shell: bash

    - name: Set up vcpkg (Windows)
      if: runner.os == 'Windows'
      run: |
        if (!(Test-Path "${{ github.workspace }}\vcpkg\.git")) {
          git clone https://github.com/microsoft/vcpkg.git "${{ github.workspace }}\vcpkg"
          cd "${{ github.workspace }}\vcpkg"
          git checkout ${{ inputs.vcpkg-tag }}
          .\bootstrap-vcpkg.bat
        } else {
          Write-Host "vcpkg already cached, skipping clone and bootstrap."
        }
      shell: pwsh

    # --- 6. AUTHENTICATION ---
    - name: Add NuGet sources (Windows)
      if: ${{ runner.os == 'Windows' && inputs.platform != 'windows-arm64' }}
      run: |
        $nuget = & "${{ env.VCPKG_EXE }}" fetch nuget | Select-Object -Last 1
        & $nuget sources add -Source "${{ env.FEED_URL }}" -StorePasswordInClearText -Name GitHubPackages -UserName "${{ env.USERNAME }}" -Password "${{ inputs.github-token }}"
        & $nuget setapikey "${{ inputs.github-token }}" -Source "${{ env.FEED_URL }}"
      shell: pwsh

    - name: Add NuGet sources (Unix)
      if: runner.os != 'Windows'
      run: |
        mono `${{ env.VCPKG_EXE }} fetch nuget | tail -n 1` sources add -Source "${{ env.FEED_URL }}" -StorePasswordInClearText -Name GitHubPackages -UserName "${{ env.USERNAME }}" -Password "${{ inputs.github-token }}"
        mono `${{ env.VCPKG_EXE }} fetch nuget | tail -n 1` setapikey "${{ inputs.github-token }}" -Source "${{ env.FEED_URL }}"
      shell: bash

    # --- 7. DEBUGGING ---
    - name: Debug vcpkg cache contents (windows-arm64)
      if: ${{ inputs.platform == 'windows-arm64' }}
      run: |
        Write-Host "=== vcpkg-cache contents ==="
        if (Test-Path "${{ github.workspace }}\vcpkg-cache") {
          Get-ChildItem -Recurse "${{ github.workspace }}\vcpkg-cache" | Select-Object FullName, Length
        } else {
          Write-Host "vcpkg-cache directory does not exist yet."
        }
      shell: pwsh